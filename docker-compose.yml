version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: hotel_db_mysql
    environment:
      MYSQL_DATABASE: hotel_reservas
      MYSQL_USER: hotel_user
      MYSQL_PASSWORD: hotel_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
